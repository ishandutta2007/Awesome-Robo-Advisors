<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="20" fill="url(#grad)" />
  <text x="50%" y="45%" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">
    Awesome Robo-Advisors
  </text>
  <text x="50%" y="70%" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">
    A curated guide to leading automated investment platforms
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
  </text>
</svg>
